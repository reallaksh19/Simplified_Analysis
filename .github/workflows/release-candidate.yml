name: Release Candidate Certification
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  certify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run check:full
      - run: npm run check:qa
      - run: npm run check:u3
      - run: npm run check:u3:behavior
      - run: npm run check:u4
      - run: npm run check:u4:behavior
      - run: npm run check:u5
      - run: npm run check:u5:behavior
      - run: npm run check:u6
      - run: npm run check:u6:behavior
      - run: npm run check:u7
      - run: npm run check:release
      - run: npm run check:benchmarks
      - run: npm run build
