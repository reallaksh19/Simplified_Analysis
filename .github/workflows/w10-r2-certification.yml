name: W10.R2 PCF Intake Certification

on:
  pull_request:
    paths:
      - 'src/core/pcf-intake/**'
      - 'src/core/workspace-consumers/**'
      - 'src/core/workspace-home/**'
      - 'src/workspace/application-shell-controller.js'
      - 'src/workspace/pcf-consumer-*.js'
      - 'src/workspace/workspace-layout.js'
      - 'scripts/w10.r2-*.mjs'
      - 'e2e/w10.r2-*.spec.js'
      - '.github/workflows/w10-r2-certification.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  certify:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Certify PCF contracts and deterministic evidence
        run: node scripts/w10.r2-pcf-intake-contract-check.mjs
      - name: Certify source and ownership boundaries
        run: |
          set -o pipefail
          node scripts/w10.r2-pcf-intake-source-guard.mjs 2>&1 | tee w10-r2-source-guard.log
      - name: Install Chromium
        run: npx playwright install chromium --with-deps
      - name: Certify PCF browser workflow
        run: npx playwright test e2e/w10.r2-pcf-intake-review.spec.js
      - name: Run full repository checks
        run: npm run check:full
      - name: Build production application
        run: npm run build
      - name: Upload certification evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: w10-r2-certification-evidence
          path: |
            w10-r2-source-guard.log
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 7
