name: W10.R3 Settings Authority Certification

on:
  pull_request:
    paths:
      - 'src/core/settings-authority/**'
      - 'src/core/workspace-consumers/**'
      - 'src/core/workspace-home/source.js'
      - 'src/workspace/application-shell-controller.js'
      - 'src/workspace/bootstrap.js'
      - 'src/workspace/event-topics.js'
      - 'src/workspace/model-calculation-controller.js'
      - 'src/workspace/settings-*.js'
      - 'src/workspace/workspace-layout.js'
      - 'scripts/w10.r3-*.mjs'
      - 'e2e/w10.r3-*.spec.js'
      - 'docs/main-tab-recovery/W10.R3_SETTINGS_AUTHORITY.md'
      - 'package.json'
      - '.github/workflows/w10-r3-certification.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  certify:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Install Chromium
        run: npx playwright install chromium --with-deps
      - name: Certify W10.R3 contracts
        run: npm run check:w10.r3:contracts
      - name: Certify W10.R3 deterministic properties
        run: npm run check:w10.r3:properties
      - name: Certify W10.R3 source boundaries
        run: node scripts/w10.r3-settings-source-guard.mjs
      - name: Certify W10.R3 registration
        run: node scripts/w10.r3-registration-check.mjs
      - name: Certify W10.R3 browser workflow
        run: npm run check:w10.r3:browser
      - name: Run combined W10.R3 certification command
        run: npm run check:w10.r3
      - name: Run full repository checks
        run: npm run check:full
      - name: Run consolidated Workspace browser checks
        run: npm run check:workspace-browser
      - name: Build production application
        run: npm run build
      - name: Upload certification evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: w10-r3-settings-certification-evidence
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 7
