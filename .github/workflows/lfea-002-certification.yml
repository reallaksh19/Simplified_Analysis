name: LFEA-002 Q4 and Mixed-Mesh Certification

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/core/element-fea/**'
      - 'scripts/lfea-002-*.mjs'
      - 'docs/element-fea/LFEA-002_IMPLEMENTATION.md'
      - '.github/workflows/lfea-002-certification.yml'
  push:
    branches:
      - agent/lfea-002-q4-mixed-mesh
    paths:
      - 'src/core/element-fea/**'
      - 'scripts/lfea-002-*.mjs'
      - 'docs/element-fea/LFEA-002_IMPLEMENTATION.md'
      - '.github/workflows/lfea-002-certification.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  certify-lfea-002:
    name: Certify LFEA-002 Q4 and mixed mesh
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Preserve LFEA-001 T3 qualification
        run: node scripts/lfea-001-check.mjs
      - name: Run LFEA-002 qualification suite
        run: node scripts/lfea-002-check.mjs
      - name: Run strict syntax validation
        run: |
          find src/core/element-fea scripts -type f \( -name '*.js' -o -name 'lfea-002-*.mjs' \) -print0 \
            | xargs -0 -n1 node --check
      - name: Verify LFEA-002 source boundary
        run: node scripts/lfea-002-source-guard.mjs
