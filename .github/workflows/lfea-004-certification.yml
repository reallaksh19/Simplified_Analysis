name: LFEA-004 Sparse CSR and PCG Certification

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/core/element-fea/**'
      - 'scripts/lfea-004-*.mjs'
      - 'docs/element-fea/LFEA-004_IMPLEMENTATION.md'
      - '.github/workflows/lfea-004-certification.yml'
  push:
    branches:
      - agent/lfea-004-sparse-pcg
    paths:
      - 'src/core/element-fea/**'
      - 'scripts/lfea-004-*.mjs'
      - 'docs/element-fea/LFEA-004_IMPLEMENTATION.md'
      - '.github/workflows/lfea-004-certification.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  certify-lfea-004:
    name: Certify LFEA-004 sparse CSR and PCG
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout exact authorized implementation head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 1
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Capture LFEA-001 contract behavior
        id: lfea001_contract
        continue-on-error: true
        run: node scripts/lfea-001-contract-check.mjs > lfea-001-contract.log 2>&1
      - name: Upload LFEA-001 contract assertion
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lfea-001-contract-assertion
          path: lfea-001-contract.log
      - name: Enforce LFEA-001 contract behavior
        if: steps.lfea001_contract.outcome != 'success'
        run: exit 1
      - name: Preserve LFEA-001 numerical behavior
        run: node scripts/lfea-001-numerical-check.mjs
      - name: Preserve LFEA-001 failure behavior
        run: node scripts/lfea-001-failure-check.mjs
      - name: Preserve LFEA-001 determinism behavior
        run: node scripts/lfea-001-determinism-check.mjs
      - name: Preserve LFEA-002 behavioral qualification
        run: |
          node scripts/lfea-002-contract-check.mjs
          node scripts/lfea-002-numerical-check.mjs
          node scripts/lfea-002-failure-check.mjs
          node scripts/lfea-002-determinism-check.mjs
      - name: Preserve LFEA-003 behavioral qualification
        run: |
          node scripts/lfea-003-contract-check.mjs
          node scripts/lfea-003-numerical-check.mjs
          node scripts/lfea-003-failure-check.mjs
          node scripts/lfea-003-determinism-check.mjs
      - name: Run complete LFEA-004 qualification suite
        run: node scripts/lfea-004-check.mjs
      - name: Run strict syntax validation
        run: |
          find src/core/element-fea scripts -type f \( -name '*.js' -o -name 'lfea-004-*.mjs' \) -print0 \
            | xargs -0 -n1 node --check
      - name: Verify LFEA-004 exact-baseline source boundary
        run: node scripts/lfea-004-source-guard.mjs
