name: W10.R4 Sketcher Recovery Certification

on:
  pull_request:
    paths:
      - 'src/core/sketcher-draft/**'
      - 'src/core/workspace-consumers/**'
      - 'src/workspace/application-shell-controller.js'
      - 'src/workspace/bootstrap.js'
      - 'src/workspace/event-topics.js'
      - 'src/workspace/sketcher-*.js'
      - 'src/workspace/workspace-layout.js'
      - 'scripts/w10.r3-settings-source-guard.mjs'
      - 'scripts/w10.r4-*.mjs'
      - 'e2e/w10.r4-*.spec.js'
      - 'docs/main-tab-recovery/W10.R4_SKETCHER_RECOVERY.md'
      - 'package.json'
      - '.github/workflows/w10-r4-certification.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  certify:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Install Chromium
        run: npx playwright install chromium --with-deps
      - name: Certify W10.R4 contracts
        run: npm run check:w10.r4:contracts
      - name: Certify W10.R4 commands
        run: npm run check:w10.r4:commands
      - name: Certify W10.R4 properties
        run: npm run check:w10.r4:properties
      - name: Certify W10.R4 source boundaries
        run: npm run check:w10.r4:source
      - name: Certify W10.R4 browser workflow
        run: npm run check:w10.r4:browser
      - name: Run combined W10.R4 certification
        run: npm run check:w10.r4
      - name: Run full repository checks
        run: npm run check:full
      - name: Run consolidated Workspace browser checks
        run: npm run check:workspace-browser
      - name: Build production application
        run: npm run build
      - name: Upload certification evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: w10-r4-sketcher-certification-evidence
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 7
